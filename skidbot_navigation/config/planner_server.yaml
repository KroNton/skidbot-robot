planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    costmap_update_timeout: 1.0
    use_sim_time: True
    planner_plugins: ["GridBased", "HybridAStar"]

    # ── A* (2D grid-based) ───────────────────────────────────────────────────
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.125                       # goal tolerance (m) if exact pose unreachable
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0                 # max seconds to plan
      cost_travel_multiplier: 2.0            # steers path toward center of aisles
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

    # ── Hybrid A* (SE(2) lattice with Reeds-Shepp curves) ───────────────────
    # Suitable for kinematically-constrained robots.
    # Parameters tuned for skidbot: wheelbase=0.40m, track=0.45m, radius=0.3m.
    HybridAStar:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.25                        # slightly relaxed vs A* (SE2 search is coarser)
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0                 # Hybrid A* needs more time
      motion_model_for_search: "REEDS_SHEPP" # allows reverse motion (suited for skid-steer)
      angle_quantization_bins: 72            # 5-degree heading resolution (360/72)
      analytic_expansion_ratio: 3.5          # attempt analytic connection every 3.5 nodes
      analytic_expansion_max_length: 3.0     # cap analytic curve length (m)
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 0.40           # derived from skidbot wheelbase (m)
      reverse_penalty: 2.0                   # 2× cost for reversing keeps forward bias
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      rotation_penalty: 5.0
      lookup_table_size: 20.0                # precomputed heuristic table extent (m)
      cache_obstacle_heuristic: true         # reuse heuristic across repeated queries
      allow_reverse_expansion: false
      debug_visualizations: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: True
      rolling_window: true
      width: 20
      height: 20
      footprint: "[[0.4, 0.195], [-0.4, 0.195], [-0.4, -0.195], [0.4, -0.195]]"
      footprint_padding: 0.01
      resolution: 0.05
      track_unknown_space: true
      plugins: ["obstacle_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 1.0
      always_send_full_costmap: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
